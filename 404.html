<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="APEX FITNESS Error Page. The requested resource could not be resolved.">
    <title>Page Not Found | APEX FITNESS</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ==========================================
       PRELOADER (HEART PULSE LOAD)
       ========================================== -->
    <div class="preloader">
        <div class="preloader-circle-wrap">
            <div class="preloader-circle"></div>
            <i class="fa-solid fa-heart-pulse preloader-icon"></i>
        </div>
        <div class="preloader-logo"><img src="images/logo.webp" alt="Stackly Logo" class="logo-img" style="height: 48px;"></div>
        <div class="preloader-percentage">0%</div>
    </div>

    <!-- ==========================================
       SCROLL PROGRESS & CUSTOM CURSOR
       ========================================== -->
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>
    
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <!-- ==========================================
       PORTAL CONTENT CARD
       ========================================== -->
    <section class="portal-section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0F172A 0%, #111827 100%); padding: 2rem 0;">
        <div class="container portal-container">
            <div class="glass-card" style="max-width: 480px; margin: 0 auto; padding: 4rem 3rem; text-align: center;">
                <div style="font-size: 5rem; color: var(--primary); margin-bottom: 1.5rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <h1 style="font-size: 3rem; font-weight: 800; color: var(--text-light); margin-bottom: 1rem; line-height: 1;">404</h1>
                <h2 style="font-size: 1.35rem; font-weight: 700; color: var(--text-light); margin-bottom: 1rem; text-transform: none;">Milestone Lost</h2>
                <p style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2.5rem;">The page or fitness log category you are attempting to locate does not exist or has been relocated to another server sector.</p>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="index.html" class="btn btn-primary" style="flex: 1; border-radius: var(--radius-sm); font-size: 0.9rem; padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><i class="fa-solid fa-house"></i> Back to Home</a>
                    <a href="javascript:history.back();" class="btn btn-secondary" style="flex: 1; border-radius: var(--radius-sm); font-size: 0.9rem; padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass);"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Script -->
    <script src="js/main.js"></script>
</body>
</html>
