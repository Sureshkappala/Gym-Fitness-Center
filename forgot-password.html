<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="APEX FITNESS Password Recovery Portal. Input your email to retrieve access instructions.">
    <title>Recover Password | APEX FITNESS</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=2.0">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ==========================================
       PRELOADER (HEART PULSE LOAD)
       ========================================== -->
    <div class="preloader">
        <div class="preloader-circle-wrap">
            <div class="preloader-circle"></div>
            <i class="fa-solid fa-heart-pulse preloader-icon"></i>
        </div>
        <div class="preloader-logo"><img src="images/logo.webp" alt="Stackly Logo" class="logo-img" style="height: 48px;"></div>
        <div class="preloader-percentage">0%</div>
    </div>

    <!-- ==========================================
       SCROLL PROGRESS & CUSTOM CURSOR
       ========================================== -->
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>
    
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <!-- Floating Back to Home button -->
    <a href="index.html" class="btn btn-secondary btn-sm floating-back-home-btn">
        <i class="fa-solid fa-house"></i> Back to Home
    </a>

    <!-- ==========================================
       PORTAL CONTENT CARD
       ========================================== -->
    <section class="portal-section" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0F172A 0%, #111827 100%); padding: 2rem 0;">
        <div class="container portal-container">
            <div class="glass-card" style="max-width: 450px; margin: 0 auto; padding: 3rem 2.5rem;">
                <div class="login-form-side">
                    <!-- Logo at top of card -->
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <img src="images/logo.webp" alt="Stackly Logo" class="logo-img" style="height: 38px; margin-bottom: 1rem;">
                        <h2 style="font-size: 1.8rem; text-transform: none; font-weight: 700; color: var(--text-light); margin-bottom: 0.5rem;">Recover Password</h2>
                        <p style="color: var(--text-muted); font-size: 0.85rem;">Input your email address to receive password reset links.</p>
                    </div>
                    
                    <form id="forgot-form">
                        <!-- Email Address with Icon -->
                        <div class="form-group">
                            <label for="forgot-email">Email Address</label>
                            <div class="input-with-icon">
                                <i class="fa-solid fa-envelope input-icon"></i>
                                <input type="email" id="forgot-email" placeholder="john@example.com" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 2rem; border-radius: var(--radius-sm);">Reset Password</button>
                        
                        <p style="text-align: center; font-size: 0.85rem; color: var(--text-muted);">
                            Remember your credentials? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login Here</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript Script -->
    <script src="js/main.js"></script>
</body>
</html>
